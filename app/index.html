<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>电竞高僧 | 英雄联盟观赛站</title>
    <meta
      name="description"
      content="聚合英雄联盟重点赛事的官方赛程、比分、战队信息与比赛预测。"
    />
    <link rel="icon" type="image/png" href="./assets/monk-mark-header.png" />
    <link rel="stylesheet" href="./assets/fonts/fonts.css?v=20260330b" />
    <link rel="stylesheet" href="./styles.css?v=20260330b" />
    <script src="./data/site-data.inline.js?v=20260330b"></script>
    <script src="./app.js?v=20260330b" defer></script>
  </head>
  <body>
    <div class="backdrop"></div>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">
            <img class="brand-mark-image" src="./assets/monk-mark-header.png" alt="电竞高僧" />
          </div>
          <div>
            <p class="eyebrow" id="brand-eyebrow">ESPORTS MONK</p>
            <h1 id="brand-name">电竞高僧</h1>
          </div>
        </div>
        <nav class="desktop-nav" id="desktop-nav" aria-label="主导航"></nav>
        <div class="top-actions">
          <div class="search-pill" id="scope-pill">LPL / First Stand / LoL</div>
          <div class="signal-pill">
            <span class="dot"></span>
            <span id="signal-text">官源同步中</span>
          </div>
        </div>
      </header>

      <main>
        <section class="hero">
          <article class="hero-match hero-dynamic" id="hero-match"></article>
        </section>

        <section class="view is-active" id="overview">
          <div class="grid grid-overview">
            <article class="panel live-panel" id="live-panel"></article>
            <article class="panel schedule-panel" id="upcoming-panel"></article>
            <article class="panel ranking-panel" id="ranking-panel"></article>
            <article class="panel spotlight-panel" id="spotlight-panel"></article>
          </div>
        </section>

        <section class="view" id="teams">
          <div class="section-title" id="teams-header"></div>
          <div class="chip-row" id="team-switcher"></div>
          <div class="grid grid-team">
            <article class="panel team-summary" id="team-summary"></article>
            <article class="panel" id="team-docket"></article>
            <article class="panel match-panel" id="team-history"></article>
            <article class="panel heat-panel" id="team-observatory"></article>
          </div>
        </section>

        <section class="view" id="players">
          <div class="section-title" id="players-header"></div>
          <div class="chip-row" id="player-switcher"></div>
          <div class="grid grid-player">
            <article class="panel player-hero" id="player-card"></article>
            <article class="panel" id="player-track"></article>
            <article class="panel" id="player-notes"></article>
            <article class="panel stat-panel" id="player-history"></article>
          </div>
        </section>

        <section class="view" id="predictions">
          <div class="section-title" id="predictions-header"></div>
          <div class="prediction-layout">
            <div class="prediction-list" id="prediction-list"></div>
          </div>
        </section>
      </main>

      <nav class="mobile-nav" id="mobile-nav" aria-label="底部导航"></nav>
    </div>
  </body>
</html>
